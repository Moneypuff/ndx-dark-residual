name: Refresh NDX Dark-Residual Dashboard

on:
  # Manual "Run workflow" button on the Actions tab
  workflow_dispatch:
    inputs:
      refresh:
        description: "Force re-download of cached FINRA/Yahoo data (slower, fully fresh)"
        type: boolean
        default: false
  # Auto-refresh at 7:00pm America/New_York every trading day (Mon-Fri).
  # GitHub cron is fixed-UTC and cannot follow US daylight-saving on its own, so
  # BOTH candidate times fire and the `gate` job below lets exactly one through --
  # whichever actually lands on 19:00 ET today. FINRA publishes the session's
  # consolidated short-volume file after ~5pm ET, so 7pm gives it a buffer; if a
  # day is still delayed, the build self-heals on the next run (see
  # FINRA_RECENT_REFETCH_DAYS in ndx_dark_residual.py). Market holidays can't be
  # excluded in cron, but on a no-data day the commit step is simply a no-op.
  schedule:
    - cron: "0 23 * * 1-5"   # 23:00 UTC = 7:00pm ET during EDT (UTC-4), Mon-Fri ET
    - cron: "0 0 * * 2-6"    # 00:00 UTC = 7:00pm ET during EST (UTC-5), Mon-Fri ET

permissions:
  contents: write

concurrency:
  group: refresh-dashboard
  cancel-in-progress: false

jobs:
  # Gate: proceed only when it is really 7:00pm ET on a weekday (so the "wrong"
  # cron for the current DST offset is skipped), or on any manual/other trigger.
  gate:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Decide whether to run (7:00pm ET on trading days)
        id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Non-schedule trigger (${{ github.event_name }}) -> proceed."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          hour=$(TZ=America/New_York date +%H)
          dow=$(TZ=America/New_York date +%u)   # 1=Mon .. 7=Sun (ET local)
          if [ "$hour" = "19" ] && [ "$dow" -ge 1 ] && [ "$dow" -le 5 ]; then
            echo "19:00 ET on a weekday (dow=$dow) -> proceed."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Not 19:00 ET weekday (ET hour=$hour dow=$dow) -> skip."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Persist FINRA/Yahoo cache between runs so each refresh only fetches new days,
      # matching the script's incremental caching design.
      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: .ndx_dark_cache
          key: ndx-dark-cache-${{ github.run_id }}
          restore-keys: |
            ndx-dark-cache-

      - name: Build dashboard
        run: >
          python ndx_dark_residual.py
          --out docs/index.html
          --cache-dir .ndx_dark_cache
          ${{ github.event.inputs.refresh == 'true' && '--refresh' || '' }}

      - name: Commit and push updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "Refresh dashboard $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
